front:
  text: 還丹袐訣養赤子神方
  hash: sha256:3f4b45c938b1ae7248ee1c2d9c99f0221abddd68cbcf99a1c77aa7e29b415165
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0233_HFL_000-001a, image: hfl/0112/0112-128.png}
body:
  text: 西山許眀道述僕昨自淳熈年間出遊方外遍叅髙人慕久視長生之道偶經由襄郢間至隨州桐栢山得遇真師姓彭名夢蘧字伯玉郢州人也是於淮瀆廟中炷香跪受金液還丹之道先生除圖像外並是口傳心受不曾書之竹帛僕聞近世學道之士徃徃被異名旁道之惑而成大丹者鮮遂不辭譴責以先生之道分列條目以示後學爲進道根基脩之庶可速成也神室神室者萬神聚㑹之府修煉金丹之要修真之士若不知此如人之無舍也神旣無居炁亦難守丹恐難造若能靜守其室則靈神自化莊子曰宇泰定發乎天光是也又曰虚室生白神明自來則中庸之道誠明是也雖神室若存若亡守法事屬兩得若一向萬境俱忘諸縁頓息神屬隂靜此乃禪伯之流也若專心守一不能應物又成十種仙人則一向不行前功並失爲導引之士也若識神室守法有度存亡有據不屬有无兩得之則歸泰定之府矣且神室者在心之北腎之南肝之右肺之左脾之旁上有綘宮曰隂鼎下有黄庭曰陽爐是爲上下釜其中徑寸虚无乃心腎之間爲之神室爲玄關樞紐玄妙哉奇妙哉刻漏刻漏者乃修真之要妙若不識刻漏則時晷不正則神室中或隆冬酷暑盛夏嚴霜致四季不調五律錯綜造化乖戾丹亦難造且刻漏者一日有一百刻以一百統於十二時每時得八刻十二時共得九十六刻其中四刻乃隂陽否奉之機發生萬彚之要也如知刻漏引鼻氣驗之陽左通隂右通十二時互換更易只分得九十六刻其四刻乃庚甲壬丙之要機也時晷時晷者乃修真之至要也若不識時晷造化難明丹亦難造其時晷者自子至己六辰乃進陽火之時也自午至亥六辰乃退隂符之候也子丑寅爲春卯辰己爲夏午未申爲秋酉戌玄爲冬其中分子午爲進退之門卯酉爲出入之户寅申爲造伏之兆如是六辰圎合應周天火數實煉士之要機也追二炁夫追二炁者乃天地未判之炁搏龍虎始姤之精爲大丹藥物憑天地杳㝠恍惚之時否泰之機括至斯時可以凝神於室中俟天地之符信一至則真神化生爲真種子也要妙在口訣㑹三性三性者乃元氣元精元神以前打湊玄關而生真人是也修真守此謂之守一存三守一乃藥物生全也可以耆翁復丁壯老嫗成姹女髮白反黑齒落更生改形免世厄號之曰真人簇五行簇五行者乃前五事俱㑹合入室進火溫水謂之攅簇五行也前二炁者乃金木也金木者水火之化機也水火者金木之相須也真人者真土也如是則五行全矣口訣在後進火進火者乃進腸火也於冬至前一腸之炁入室其十五日築固靈根神存在腎伺腸火一運行其神隨逐而進腎中根也神室蒂也自根至蔕所以相連故能結胎成果吸之根吸之帶節候周而成大丹也如冬至夜進陽火須是亥未子初從壬上起火一舉三時其息並無出入自子歷丑至寅末甲上金火逼逐入室其丹漸結至卯不進住火乃幽㣲之限也辰時復進火口訣至己未金火逼逐至髓海陽火旣極則運隂符矣溫水溫水者乃運隂符也自内上運符得行三時其息並無出入至午歴未至申未庚上金水從雙關鵲橋入室玄珠漸兆至酉不運符候金砂沐浴至戌復運符候口訣至亥歸源一陽復生則根源本始神俱化也一日服一粒大如黍米一年功力還丹始就共三百六十日計四千三百二十時除卯酉二時金木沐浴不進腸火不運隂符其息出入故除此兩月六十日正得三百日受火符煉就金丹亦如常人十箇月胎圎其間用運須是細意調爕志誠運圖若纎介不正晦吝作咎丹之不結則赤龍奔逸姹女逃亡率意輕舉不合天機又非符火之咎乃運火符之士過也經云知之修煉謂之聖人其可怱諸脱胎脱胎者乃前聖胎旣就未可出室更於室中行脱胎工夫謹存聖胎於髓海中不過兩太隂甲子直待天門忽開如霹靂一聲則聖胎脫出兩箇一般無二樣未可便離體更有仙化之道在後雲房曰一聲霹靂震崑崙無限神明暗失驚兩箇一般無二様始知功滿出埃塵神化神化者乃前聖胎出體未可遠離恐逢尸障初離一歩十歩一百里一千里千萬里然後巡行三界透石貫金俱無碍障去住在我不在乎天雲房曰孩兒㓜小未成人須藉爺娘養育恩三載九年人事盡縱橫天下不由親此乃運還丹袐訣養赤子神方希夷妙道非旁門淺術此文得之者可寳而祕之若傳非人必遭天譴得人不傳亦受其殃師囑甚重可不戒焉修真傳沠張天罡字子正蜀人彭夢蘧字伯玉蜀人蕭應叟字潤清三山人許子微字明道山西人林元鼎字正夫三山人還丹袐訣養赤子神方
